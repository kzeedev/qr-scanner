name: qrscanner
description: "Bulk Barcode Scanner App"
publish_to: 'none'
version: 1.2.1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  camera: ^0.12.0+2
  crypto: ^3.0.7
  dynamic_color: ^1.8.1
  flutter:
    sdk: flutter
  flutter_zxing: ^2.3.0
  http: ^1.6.0
  open_filex: ^4.7.0
  package_info_plus: ^10.2.1
  path_provider: ^2.1.6
  share_plus: ^13.2.0
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: "^0.14.4"

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon/icon.png"
